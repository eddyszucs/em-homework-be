name: Build and Deploy ASP.NET Core to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  AZURE_WEBAPP_NAME: clinic-backend-api   # ← Change to your actual app name
  AZURE_WEBAPP_PACKAGE_PATH: ./publish

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: |
          dotnet restore ClinicBackend/ClinicBackend.csproj
          dotnet restore ClinicBackend.Tests/ClinicBackend.Tests.csproj
        working-directory: ./

      - name: Build main project
        run: dotnet build ClinicBackend/ClinicBackend.csproj --configuration Release --no-restore
        working-directory: ./

      - name: Build test project
        run: dotnet build ClinicBackend.Tests/ClinicBackend.Tests.csproj --configuration Release --no-restore
        working-directory: ./

      - name: Test
        run: dotnet test ClinicBackend.Tests/ClinicBackend.Tests.csproj --configuration Release --no-build
        working-directory: ./

      - name: Package for deployment
        run: |
          dotnet publish ClinicBackend/ClinicBackend.csproj \
            -c Release \
            -p:PublishProtocol=Zip \
            -p:PublishDir=./publish \
            --no-build
        working-directory: ./

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3853C32C9A44454693537621ADC219B1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FD8AB91AF8E64D638255BB2647F11267 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E10AAC68CFA144A4B8DD0DC220F53EEB }}

      - name: Deploy app via Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: production
          package: ./publish/publish.zip

      - name: Set environment variables in Azure
        run: |
          az webapp config appsettings set \
            --resource-group clinic-backend-rg \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --settings \
              ConnectionStrings__DefaultConnection="${{ secrets.POSTGRES_CONNECTION_STRING }}" \
              Jwt__Key="${{ secrets.JWT__KEY }}" \
              Jwt__Issuer="${{ secrets.JWT__ISSUER }}" \
              Jwt__Audience="${{ secrets.JWT__AUDIENCE }}" \
              Jwt__ExpiryMinutes="${{ secrets.JWT__EXPIRYMINUTES }}"